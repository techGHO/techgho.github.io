name: Daily Auto Post

on:
  schedule:
    - cron: '0 22 * * *'  # KST 07:00 (UTC 22:00)
  workflow_dispatch:

jobs:
  create-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate daily post with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          permission_mode: bypassPermissions
          max_turns: 10
          prompt: |
            오늘 날짜(KST)를 기준으로 이 Jekyll 블로그에 새 포스트를 작성하고, git add/commit/push까지 완료해주세요.

            ## 블로그 정보
            - 테마: Minimal Mistakes (GitHub Pages 배포)
            - 주제: SRE, 미들웨어(WebLogic·JBoss·Tomcat), 인프라 운영, 트러블슈팅, DevOps, 클라우드(OCI·AWS)
            - 독자: 현업 인프라·백엔드 엔지니어

            ## front matter 구조 (반드시 준수)
            ```yaml
            ---
            layout: single
            author_profile: true
            title: "제목 (한국어)"
            date: YYYY-MM-DD HH:MM:SS +0900
            categories:
              - 카테고리 (예: Middleware / SRE / DevOps / Infra / Database)
            tags:
              - 태그1
              - 태그2
            toc: true
            toc_sticky: true
            header:
              overlay_image: https://images.unsplash.com/photo-1555066931-4365d14bab8c?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80
              overlay_filter: 0.5
              show_overlay_excerpt: false
            excerpt: "포스트 요약 (한국어, 1~2문장)"
            ---
            ```

            ## 글쓰기 스타일
            - 한국어로 작성
            - 실무 엔지니어 관점의 기술 심층 분석
            - `## 1. 개요`, `## 2. ...` 형식의 번호 섹션 구성
            - bash/shell 코드블록 적극 활용 (주석 포함)
            - 실제 운영 경험 기반의 트러블슈팅·성능 최적화 팁 포함
            - 분량: 최소 800단어 이상

            ## 파일명 규칙
            `_posts/YYYY-MM-DD-영문-슬러그.md` (날짜는 오늘 KST 기준, 슬러그는 소문자 하이픈 구분)

            ## 기존 포스트 참고
            `_posts/2026-04-20-weblogic-14c-silent-install-oracle-linux.md` 파일을 먼저 읽어 front matter와 글 스타일을 파악한 뒤 동일한 형식으로 작성하세요.

            ## 작업 순서
            1. 기존 포스트 파일을 읽어 스타일 확인
            2. 오늘 날짜에 적합한 기술 주제 선정 (이미 작성된 주제와 겹치지 않게)
            3. `_posts/YYYY-MM-DD-슬러그.md` 파일 생성
            4. `git add _posts/YYYY-MM-DD-슬러그.md` 실행
            5. `git commit -m "Add daily post: YYYY-MM-DD 포스트 제목"` 실행
            6. `git push` 실행
